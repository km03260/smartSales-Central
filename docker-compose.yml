services:
  api:
    build: .
    container_name: smartapps-api
    restart: unless-stopped
    env_file: .env
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3500/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.smartapps-api.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.smartapps-api.entrypoints=websecure"
      - "traefik.http.routers.smartapps-api.tls.certresolver=myresolver"
      - "traefik.http.services.smartapps-api.loadbalancer.server.port=3500"
    networks:
      - traefik
      - dbtesting

  dashboard:
    build: ./dashboard
    container_name: smartapps-dashboard
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.smartapps-dashboard.rule=Host(`admin.${DOMAIN}`)"
      - "traefik.http.routers.smartapps-dashboard.entrypoints=websecure"
      - "traefik.http.routers.smartapps-dashboard.tls.certresolver=myresolver"
      - "traefik.http.services.smartapps-dashboard.loadbalancer.server.port=80"
    networks:
      - traefik

  website:
    build: ./website
    container_name: smartapps-website
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.smartapps-website.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.smartapps-website.entrypoints=websecure"
      - "traefik.http.routers.smartapps-website.tls.certresolver=myresolver"
      - "traefik.http.services.smartapps-website.loadbalancer.server.port=80"
    networks:
      - traefik

volumes:
  uploads_data:

networks:
  traefik:
    external: true
  dbtesting:
    external: true

services:
  api:
    build: .
    container_name: customapps-api
    restart: unless-stopped
    env_file: .env
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3500/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.customapps-api.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.customapps-api.entrypoints=websecure"
      - "traefik.http.routers.customapps-api.tls.certresolver=myresolver"
      - "traefik.http.services.customapps-api.loadbalancer.server.port=3500"
      - "traefik.docker.network=traefik"
    networks:
      - traefik
      - dbnetprod

  dashboard:
    build: ./dashboard
    container_name: customapps-dashboard
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.customapps-dashboard.rule=Host(`admin.${DOMAIN}`)"
      - "traefik.http.routers.customapps-dashboard.entrypoints=websecure"
      - "traefik.http.routers.customapps-dashboard.tls.certresolver=myresolver"
      - "traefik.http.services.customapps-dashboard.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik"
    networks:
      - traefik

  website:
    build: ./website
    container_name: customapps-website
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.customapps-website.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.customapps-website.entrypoints=websecure"
      - "traefik.http.routers.customapps-website.tls.certresolver=myresolver"
      - "traefik.http.services.customapps-website.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik"
      # Redirections 301 des anciennes URLs (SEO — préserve le link juice)
      - "traefik.http.middlewares.customapps-old-urls.redirectregex.regex=^https?://${DOMAIN}/(fonctionnalites|tarifs)/?$$"
      - "traefik.http.middlewares.customapps-old-urls.redirectregex.replacement=https://${DOMAIN}/apps/custom-sales"
      - "traefik.http.middlewares.customapps-old-urls.redirectregex.permanent=true"
      - "traefik.http.routers.customapps-website.middlewares=customapps-old-urls"
    networks:
      - traefik

volumes:
  uploads_data:

networks:
  traefik:
    external: true
  dbnetprod:
    external: true

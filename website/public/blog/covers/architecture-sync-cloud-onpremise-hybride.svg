<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Architecture">
  <defs>
    <linearGradient id="bg-architecture-sync-cloud-onpremise-hybride" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </linearGradient>
    <radialGradient id="glow-architecture-sync-cloud-onpremise-hybride" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="corner-architecture-sync-cloud-onpremise-hybride" cx="100%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots-architecture-sync-cloud-onpremise-hybride" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#ffffff" fill-opacity="0.06"/>
    </pattern>
    <filter id="blur-architecture-sync-cloud-onpremise-hybride" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Backgrounds -->
  <rect width="1200" height="630" fill="url(#bg-architecture-sync-cloud-onpremise-hybride)"/>
  <rect width="1200" height="630" fill="url(#dots-architecture-sync-cloud-onpremise-hybride)"/>
  <rect width="1200" height="630" fill="url(#corner-architecture-sync-cloud-onpremise-hybride)"/>

  <!-- Glow behind icon -->
  <circle cx="600" cy="315" r="240" fill="url(#glow-architecture-sync-cloud-onpremise-hybride)"/>

  <!-- Decorative arcs -->
  <circle cx="600" cy="315" r="200" stroke="#fb923c" stroke-opacity="0.18" stroke-width="1.5" fill="none"/>
  <circle cx="600" cy="315" r="260" stroke="#fb923c" stroke-opacity="0.10" stroke-width="1" fill="none"/>
  <circle cx="600" cy="315" r="320" stroke="#fb923c" stroke-opacity="0.06" stroke-width="1" fill="none"/>

  <!-- Decorative blobs -->
  <circle cx="100" cy="100" r="180" fill="#f97316" fill-opacity="0.12" filter="url(#blur-architecture-sync-cloud-onpremise-hybride)"/>
  <circle cx="1100" cy="530" r="160" fill="#fb923c" fill-opacity="0.10" filter="url(#blur-architecture-sync-cloud-onpremise-hybride)"/>

  <!-- Central icon in a rounded square -->
  <rect x="480" y="195" width="240" height="240" rx="48" fill="#f97316" fill-opacity="0.15"/>
  <rect x="490" y="205" width="220" height="220" rx="42" fill="#0f172a" fill-opacity="0.6"/>
  <rect x="490" y="205" width="220" height="220" rx="42" fill="none" stroke="#fb923c" stroke-opacity="0.4" stroke-width="1.5"/>

  <!-- Icon (heroicons outline, scaled/translated to fit 160×160 centered at 600,315) -->
  <g transform="translate(520, 235) scale(6.67)">
    <path d="M4 5a2 2 0 012-2h12a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V5zM4 17a2 2 0 012-2h12a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM9 11h2M9 15h2M9 7h2" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Category label -->
  <g transform="translate(600, 490)">
    <rect x="-120" y="-20" width="240" height="40" rx="20" fill="#ffffff" fill-opacity="0.1"/>
    <text x="0" y="6" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="16" fill="#fb923c" letter-spacing="2">ARCHITECTURE</text>
  </g>

  <!-- customApps logo corner -->
  <g transform="translate(60, 560)">
    <rect x="0"  y="0"  width="18" height="18" rx="4" fill="#fb923c"/>
    <rect x="24" y="0"  width="18" height="18" rx="4" fill="#fb923c" fill-opacity="0.5"/>
    <rect x="0"  y="24" width="18" height="18" rx="4" fill="#fb923c" fill-opacity="0.5"/>
    <rect x="24" y="24" width="18" height="18" rx="4" fill="#fb923c"/>
    <text x="54" y="28" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="20" fill="#ffffff" fill-opacity="0.85">customApps</text>
  </g>

  <!-- Subtle badge bottom-right -->
  <g transform="translate(1140, 590)" text-anchor="end">
    <text font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="13" fill="#ffffff" fill-opacity="0.45">blog.customapps.fr</text>
  </g>
</svg>